<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="description" content="Auto Clipper for YouTube Shorts - Paste YouTube URL directly">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ShortClipper - YouTube Auto Shorts Maker</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --accent: #ff3b5c;
            --text: #e0e0e0;
            --text2: #a0a0b0;
            --border: #2a2a3e;
            --success: #00e676;
            --radius: 16px;
            --youtube: #ff0000;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; flex-wrap: wrap; gap: 12px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.4rem; font-weight: 700; color: #fff; }
        .logo-icon { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #ff3b5c, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .youtube-badge { background: var(--youtube); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-left: 8px; }
        
        .upload-section { display: flex; flex-direction: column; gap: 16px; }
        .drop-zone {
            border: 2px dashed var(--border); border-radius: var(--radius); padding: 30px 20px;
            text-align: center; cursor: pointer; background: var(--surface);
            transition: all 0.3s ease; min-height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        }
        .drop-zone:hover, .drop-zone.active { border-color: var(--accent); background: #16213e; }
        .drop-zone h3 { color: #fff; font-size: 1rem; }
        .drop-zone p { color: var(--text2); font-size: 0.8rem; }
        .drop-zone input[type="file"] { display: none; }
        .or-divider { text-align: center; color: var(--text2); font-size: 0.8rem; position: relative; }
        .or-divider::before, .or-divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
        .or-divider::before { left: 0; }
        .or-divider::after { right: 0; }
        
        .url-section { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .url-input-wrapper { display: flex; gap: 8px; }
        .url-input-wrapper input {
            flex: 1; padding: 12px 16px; border-radius: 25px; border: 2px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.9rem; outline: none;
            transition: all 0.3s ease;
        }
        .url-input-wrapper input:focus { border-color: var(--youtube); }
        .url-input-wrapper input::placeholder { color: #666; }
        .url-input-wrapper button {
            padding: 12px 24px; border-radius: 25px; border: none; background: var(--youtube);
            color: #fff; font-weight: 700; cursor: pointer; font-size: 0.9rem; white-space: nowrap;
            transition: all 0.2s ease; display: flex; align-items: center; gap: 6px;
        }
        .url-input-wrapper button:hover { background: #cc0000; transform: scale(1.02); }
        .url-input-wrapper button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .url-hint { font-size: 0.75rem; color: var(--text2); text-align: center; }
        .supported-formats { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; font-size: 0.7rem; color: var(--text2); }
        .supported-formats span { background: var(--surface); padding: 4px 8px; border-radius: 4px; }
        
        .video-preview { display: none; background: #000; border-radius: var(--radius); overflow: hidden; }
        .video-preview.show { display: block; }
        video { width: 100%; max-height: 400px; display: block; background: #000; }
        .video-info-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--surface); flex-wrap: wrap; gap: 10px;
            font-size: 0.85rem; color: var(--text2);
        }
        button {
            padding: 10px 20px; border-radius: 25px; border: none;
            font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        .progress { display: none; background: var(--surface); border-radius: var(--radius); padding: 20px; }
        .progress.show { display: block; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .progress-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff6b6b); border-radius: 4px; transition: width 0.3s ease; width: 0%; }
        
        .clips-container { display: none; flex-direction: column; gap: 12px; }
        .clips-container.show { display: flex; }
        .clips-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .clips-header h2 { color: #fff; font-size: 1.1rem; }
        .badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; }
        
        .clip-card {
            background: var(--surface); border-radius: var(--radius); padding: 14px;
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            border: 2px solid transparent; cursor: pointer; transition: all 0.2s ease;
        }
        .clip-card:hover { border-color: var(--accent); }
        .clip-thumb { width: 80px; height: 80px; border-radius: 10px; background: #000; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2rem; }
        .clip-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .clip-info { flex: 1; min-width: 140px; }
        .clip-info h4 { color: #fff; font-size: 0.9rem; margin-bottom: 4px; }
        .clip-info .meta { font-size: 0.78rem; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
        .clip-actions { display: flex; gap: 6px; }
        .clip-actions button { padding: 7px 14px; border-radius: 18px; font-size: 0.8rem; }
        .btn-export { background: var(--accent); color: #fff; }
        .btn-preview { background: #16213e; color: var(--text); }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface); border-radius: var(--radius); padding: 24px;
            width: 100%; max-width: 480px; text-align: center;
        }
        .modal-content h3 { color: #fff; margin-bottom: 14px; }
        .modal-content video { width: 100%; max-height: 280px; border-radius: 10px; background: #000; margin-bottom: 14px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px);
            background: #333; color: #fff; padding: 12px 24px; border-radius: 25px;
            font-weight: 600; font-size: 0.9rem; z-index: 200;
            transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); color: #000; }
        .toast.error { background: var(--accent); }
        
        .back-btn {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 50;
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        .back-btn.show { display: block; }
        
        @media (max-width: 600px) {
            .container { padding: 0 8px; }
            .clip-card { flex-direction: column; align-items: stretch; }
            .clip-thumb { width: 100%; height: 120px; }
            .clip-actions button { flex: 1; }
            .url-input-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn">← Back</button>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">✂️</div>
                <span>ShortClipper <span class="youtube-badge">YT</span></span>
            </div>
            <button class="btn-outline" id="installBtn" style="display:none;">⬇️ Install</button>
        </div>
        
        <div class="upload-section" id="uploadSection">
            <div class="drop-zone" id="dropZone">
                <div style="font-size: 2.5rem;">📁</div>
                <h3>Click or Drop Video File Here</h3>
                <p>MP4, WebM, MOV (max 500MB)</p>
                <input type="file" id="fileInput" accept="video/*">
            </div>
            
            <div class="or-divider">OR</div>
            
            <div class="url-section">
                <div class="url-input-wrapper">
                    <input type="text" id="urlInput" placeholder="Paste YouTube URL here... (e.g., https://youtube.com/watch?v=...)">
                    <button id="urlLoadBtn">🔴 Load YT</button>
                </div>
                <div class="url-hint">Works with: YouTube, direct video URLs (MP4, WebM)</div>
                <div class="supported-formats">
                    <span>YouTube</span>
                    <span>MP4</span>
                    <span>WebM</span>
                    <span>MOV</span>
                </div>
            </div>
        </div>
        
        <div class="video-preview" id="videoPreview">
            <video id="mainVideo" controls crossorigin="anonymous" playsinline></video>
            <div class="video-info-bar">
                <span>📹 <span id="videoName">-</span></span>
                <span>⏱️ <span id="videoDuration">-</span></span>
                <button class="btn-primary" id="reanalyzeBtn">🔁 Re-Analyze</button>
            </div>
        </div>
        
        <div class="progress" id="progressSection">
            <div class="progress-header">
                <span id="progressLabel">🤖 Analyzing...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="clips-container" id="clipsSection">
            <div class="clips-header">
                <h2>🎯 Detected Clips <span class="badge" id="clipCount">0</span></h2>
                <button class="btn-outline" id="exportFirstBtn">📦 Export First Clip</button>
            </div>
            <div id="clipsList"></div>
        </div>
    </div>
    
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <h3>🎬 Clip Preview (9:16 Vertical)</h3>
            <video id="previewVideo" controls playsinline loop></video>
            <div class="modal-buttons">
                <button class="btn-outline" id="closeModal">Close</button>
                <button class="btn-primary" id="downloadClip">💾 Download</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
    (function() {
        // DOM Elements
        const uploadSection = document.getElementById('uploadSection');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const urlInput = document.getElementById('urlInput');
        const urlLoadBtn = document.getElementById('urlLoadBtn');
        const videoPreview = document.getElementById('videoPreview');
        const mainVideo = document.getElementById('mainVideo');
        const videoName = document.getElementById('videoName');
        const videoDuration = document.getElementById('videoDuration');
        const reanalyzeBtn = document.getElementById('reanalyzeBtn');
        const progressSection = document.getElementById('progressSection');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');
        const clipsSection = document.getElementById('clipsSection');
        const clipsList = document.getElementById('clipsList');
        const clipCount = document.getElementById('clipCount');
        const exportFirstBtn = document.getElementById('exportFirstBtn');
        const exportModal = document.getElementById('exportModal');
        const previewVideo = document.getElementById('previewVideo');
        const closeModal = document.getElementById('closeModal');
        const downloadClip = document.getElementById('downloadClip');
        const toast = document.getElementById('toast');
        const installBtn = document.getElementById('installBtn');
        const backBtn = document.getElementById('backBtn');

        // State
        let currentVideoSrc = null;
        let detectedClips = [];
        let currentExportBlob = null;
        let isAnalyzing = false;
        let analysisId = 0;
        let deferredPrompt = null;

        // CORS Proxies (try these in order)
        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        // PWA Install
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.textContent = '✅ Installed';
                showToast('App installed! 🎉', 'success');
            }
            deferredPrompt = null;
        });
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBtn.textContent = '✅ Installed';
            installBtn.style.display = 'flex';
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([`
                const CACHE = 'shortclipper-yt-v1';
                self.addEventListener('install', e => {
                    self.skipWaiting();
                    e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])).catch(() => {}));
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => 
                        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
                    ));
                    self.clients.claim();
                });
                self.addEventListener('fetch', e => {
                    if (e.request.method !== 'GET') return;
                    e.respondWith(
                        caches.match(e.request).then(cached => 
                            cached || fetch(e.request).then(resp => {
                                if (resp.ok && resp.type === 'basic') {
                                    const clone = resp.clone();
                                    caches.open(CACHE).then(c => c.put(e.request, clone));
                                }
                                return resp;
                            }).catch(() => cached || new Response('Offline', {status: 503}))
                        )
                    );
                });
            `], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: '/' })
                .then(() => console.log('✅ SW registered'))
                .catch(() => console.log('SW optional'));
        }

        // Toast
        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Format time
        function formatTime(sec) {
            if (!isFinite(sec)) return '--:--';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Back button
        backBtn.addEventListener('click', resetUI);
        
        function resetUI() {
            if (currentVideoSrc && currentVideoSrc.startsWith('blob:')) {
                URL.revokeObjectURL(currentVideoSrc);
            }
            currentVideoSrc = null;
            detectedClips = [];
            videoPreview.classList.remove('show');
            clipsSection.classList.remove('show');
            progressSection.classList.remove('show');
            uploadSection.style.display = 'flex';
            backBtn.classList.remove('show');
            mainVideo.src = '';
            updateClipsList();
        }

        // File handling
        dropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
                fileInput.click();
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleFile(file);
            } else {
                showToast('Please drop a video file', 'error');
            }
        });

        function handleFile(file) {
            if (file.size > 500 * 1024 * 1024) {
                showToast('File too large (max 500MB)', 'error');
                return;
            }
            if (currentVideoSrc && currentVideoSrc.startsWith('blob:')) {
                URL.revokeObjectURL(currentVideoSrc);
            }
            analysisId++;
            currentVideoSrc = URL.createObjectURL(file);
            videoName.textContent = file.name;
            loadVideo(currentVideoSrc, true);
        }

        // YouTube URL handling
        urlLoadBtn.addEventListener('click', () => handleYouTubeURL());
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleYouTubeURL();
        });

        async function handleYouTubeURL() {
            const url = urlInput.value.trim();
            if (!url) {
                showToast('Please paste a YouTube URL', 'error');
                return;
            }

            // Check if it's a YouTube URL
            const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]+)/);
            
            if (ytMatch) {
                const videoId = ytMatch[1];
                showToast('🔴 Fetching YouTube video... This may take a moment', '');
                urlLoadBtn.disabled = true;
                
                try {
                    const videoUrl = await fetchYouTubeVideo(videoId);
                    if (videoUrl) {
                        handleDirectURL(videoUrl);
                    } else {
                        showToast('Could not fetch YouTube video. Try downloading it first.', 'error');
                    }
                } catch(e) {
                    console.error('YouTube fetch error:', e);
                    showToast('YouTube fetch failed. Try a direct video URL instead.', 'error');
                }
                
                urlLoadBtn.disabled = false;
            } else if (url.match(/\.(mp4|webm|mov|mkv)(\?.*)?$/i) || url.includes('video')) {
                // Direct video URL
                handleDirectURL(url);
            } else {
                showToast('Please enter a valid YouTube URL or direct video URL', 'error');
            }
        }

        async function fetchYouTubeVideo(videoId) {
            // Try multiple methods to get the video
            const methods = [
                // Method 1: Try yt-dlp web API (if available)
                async () => {
                    const response = await fetch(`https://invidiious.fdn.fr/latest_version?id=${videoId}&itag=18`);
                    if (response.ok) {
                        const data = await response.json();
                        return data.url || null;
                    }
                    return null;
                },
                // Method 2: Try Invidious API
                async () => {
                    const response = await fetch(`https://invidiious.fdn.fr/api/v1/videos/${videoId}`);
                    if (response.ok) {
                        const data = await response.json();
                        // Get 360p or 720p format
                        const format = data.formatStreams?.find(f => f.quality === '360p' || f.quality === '720p') 
                                    || data.adaptiveFormats?.find(f => f.type?.includes('video'));
                        return format?.url || null;
                    }
                    return null;
                },
                // Method 3: Direct embed URL with proxy
                async () => {
                    const embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    for (const proxy of CORS_PROXIES) {
                        try {
                            const response = await fetch(proxy + encodeURIComponent(embedUrl));
                            if (response.ok) {
                                const html = await response.text();
                                const match = html.match(/"url_encoded_fmt_stream_map":"([^"]+)"/);
                                if (match) {
                                    const streams = decodeURIComponent(match[1]);
                                    const urlMatch = streams.match(/url=([^&,]+)/);
                                    if (urlMatch) return decodeURIComponent(urlMatch[1]);
                                }
                            }
                        } catch(e) { continue; }
                    }
                    return null;
                }
            ];

            for (const method of methods) {
                try {
                    const url = await method();
                    if (url) return url;
                } catch(e) { continue; }
            }

            return null;
        }

        function handleDirectURL(url) {
            analysisId++;
            currentVideoSrc = url;
            videoName.textContent = url.split('/').pop().split('?')[0] || 'Video';
            loadVideo(url, false);
        }

        function loadVideo(src, isLocal) {
            showToast('Loading video...', '');
            
            mainVideo.src = src;
            mainVideo.crossOrigin = isLocal ? 'anonymous' : 'anonymous';
            videoPreview.classList.add('show');
            uploadSection.style.display = 'none';
            backBtn.classList.add('show');
            
            detectedClips = [];
            clipsSection.classList.remove('show');
            progressSection.classList.remove('show');
            updateClipsList();
            
            mainVideo.onloadedmetadata = () => {
                videoDuration.textContent = formatTime(mainVideo.duration);
                showToast('Video loaded! Auto-analyzing...', 'success');
                setTimeout(() => startAnalysis(), 300);
            };
            
            mainVideo.onerror = (e) => {
                console.error('Video load error:', e);
                showToast('Cannot load video. If it\'s YouTube, try downloading it first.', 'error');
                // For CORS issues, try with different approach
                if (!isLocal && src.includes('youtube')) {
                    showToast('YouTube videos need to be downloaded first. Use a video downloader.', 'error');
                }
            };
        }

        // Re-analyze
        reanalyzeBtn.addEventListener('click', () => {
            if (!mainVideo.src || mainVideo.readyState < 2) {
                showToast('Load a video first', 'error');
                return;
            }
            startAnalysis();
        });

        // AI Analysis (same as before, kept for completeness)
        async function startAnalysis() {
            if (isAnalyzing) return;
            isAnalyzing = true;
            reanalyzeBtn.disabled = true;
            const currentId = ++analysisId;
            
            progressSection.classList.add('show');
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';
            progressLabel.textContent = '🤖 AI scanning frames...';
            
            detectedClips = [];
            updateClipsList();
            
            const duration = mainVideo.duration;
            if (duration < 2) {
                showToast('Video too short', 'error');
                finishAnalysis();
                return;
            }
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 160;
            canvas.height = 90;
            
            const maxSamples = Math.min(Math.floor(duration / 0.5), 200);
            const interval = duration / maxSamples;
            const frameData = [];
            
            for (let i = 0; i < maxSamples; i++) {
                if (currentId !== analysisId) { finishAnalysis(); return; }
                
                try {
                    mainVideo.currentTime = i * interval;
                    await new Promise(resolve => {
                        const handler = () => {
                            mainVideo.removeEventListener('seeked', handler);
                            resolve();
                        };
                        mainVideo.addEventListener('seeked', handler);
                    });
                    
                    ctx.drawImage(mainVideo, 0, 0, 160, 90);
                    const imgData = ctx.getImageData(0, 0, 160, 90);
                    frameData.push({
                        time: i * interval,
                        brightness: getBrightness(imgData),
                        edgeScore: getEdgeScore(imgData)
                    });
                } catch(e) { continue; }
                
                progressFill.style.width = Math.round(((i+1)/maxSamples)*50) + '%';
                progressPercent.textContent = Math.round(((i+1)/maxSamples)*50) + '%';
            }
            
            if (currentId !== analysisId || frameData.length < 3) {
                finishAnalysis();
                if (frameData.length < 3) showToast('Could not analyze video', 'error');
                return;
            }
            
            progressLabel.textContent = '🧠 Detecting best moments...';
            progressFill.style.width = '70%';
            progressPercent.textContent = '70%';
            
            const clips = findClips(frameData, duration, interval);
            
            if (currentId !== analysisId) { finishAnalysis(); return; }
            
            progressLabel.textContent = '✨ Generating thumbnails...';
            progressFill.style.width = '90%';
            progressPercent.textContent = '90%';
            
            await generateThumbnails(clips, canvas, ctx);
            
            if (currentId !== analysisId) { finishAnalysis(); return; }
            
            detectedClips = clips;
            progressFill.style.width = '100%';
            progressPercent.textContent = '100%';
            progressLabel.textContent = '✅ Complete!';
            
            updateClipsList();
            clipsSection.classList.add('show');
            clipCount.textContent = detectedClips.length;
            
            setTimeout(() => progressSection.classList.remove('show'), 800);
            finishAnalysis();
            showToast(`Found ${detectedClips.length} clips! 🎯`, 'success');
        }
        
        function finishAnalysis() {
            isAnalyzing = false;
            reanalyzeBtn.disabled = false;
        }
        
        function getBrightness(imgData) {
            const d = imgData.data;
            let sum = 0;
            for (let i = 0; i < d.length; i += 4) sum += d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
            return sum / (d.length / 4);
        }
        
        function getEdgeScore(imgData) {
            const d = imgData.data;
            const w = 160, h = 90;
            let edgeSum = 0;
            for (let y = 1; y < h-1; y++) {
                for (let x = 1; x < w-1; x++) {
                    const idx = (y*w + x)*4;
                    const gx = Math.abs((d[idx]+d[idx+1]+d[idx+2]) - (d[idx+4]+d[idx+5]+d[idx+6]));
                    const gy = Math.abs((d[idx]+d[idx+1]+d[idx+2]) - (d[idx+w*4]+d[idx+w*4+1]+d[idx+w*4+2]));
                    edgeSum += gx + gy;
                }
            }
            return edgeSum / ((w-2)*(h-2)*3);
        }
        
        function findClips(frameData, duration, interval) {
            const scores = frameData.map((f, i) => {
                let score = 0;
                if (i > 0) {
                    score += Math.abs(f.brightness - frameData[i-1].brightness) * 0.5;
                    score += Math.abs(f.edgeScore - frameData[i-1].edgeScore) * 0.5;
                }
                score += Math.min(f.edgeScore / 80, 2);
                return { time: f.time, score };
            });
            
            const smoothed = [];
            for (let i = 0; i < scores.length; i++) {
                let sum = 0, cnt = 0;
                for (let j = Math.max(0, i-2); j <= Math.min(scores.length-1, i+2); j++) {
                    sum += scores[j].score; cnt++;
                }
                smoothed.push({ time: scores[i].time, score: cnt ? sum/cnt : 0 });
            }
            
            const peaks = [];
            for (let i = 2; i < smoothed.length-2; i++) {
                if (smoothed[i].score > smoothed[i-1].score && 
                    smoothed[i].score > smoothed[i+1].score && 
                    smoothed[i].score > 0.3) {
                    peaks.push({ ...smoothed[i], index: i });
                }
            }
            
            const clipDur = Math.floor(45/interval);
            const used = [];
            const clips = [];
            
            for (const peak of peaks) {
                const start = Math.max(0, peak.index - Math.floor(clipDur/3));
                const end = Math.min(smoothed.length-1, peak.index + Math.floor(clipDur*2/3));
                const sTime = smoothed[start].time;
                const eTime = Math.min(smoothed[end].time, sTime+60);
                const dur = eTime - sTime;
                if (dur < 5 || dur > 60) continue;
                
                let overlaps = false;
                for (const u of used) {
                    if (start < u.end && end > u.start) { overlaps = true; break; }
                }
                if (overlaps) continue;
                
                let total = 0, cnt = 0;
                for (let j = start; j <= end; j++) { total += smoothed[j].score; cnt++; }
                used.push({ start, end });
                clips.push({
                    startTime: sTime, endTime: eTime, duration: dur,
                    score: (cnt ? total/cnt : 0) + peak.score * 0.5, peakTime: peak.time
                });
            }
            
            if (clips.length === 0 && duration > 10) {
                const num = Math.min(Math.floor(duration/30), 4);
                for (let i = 0; i < num; i++) {
                    const s = i * (duration/num);
                    const e = Math.min(s + 45, duration);
                    if (e-s >= 8) clips.push({
                        startTime: s, endTime: e, duration: e-s,
                        score: 1, peakTime: s + (e-s)/2
                    });
                }
            }
            
            clips.sort((a,b) => b.score - a.score);
            return clips.slice(0, 6).sort((a,b) => a.startTime - b.startTime)
                .map((c,i) => ({...c, id: i+1, title: `Clip ${i+1}`, thumbnail: null}));
        }
        
        async function generateThumbnails(clips, canvas, ctx) {
            for (const clip of clips) {
                try {
                    const mid = clip.peakTime || (clip.startTime+clip.endTime)/2;
                    mainVideo.currentTime = Math.min(mid, mainVideo.duration-0.1);
                    await new Promise(resolve => {
                        const handler = () => {
                            mainVideo.removeEventListener('seeked', handler);
                            resolve();
                        };
                        mainVideo.addEventListener('seeked', handler);
                    });
                    ctx.drawImage(mainVideo, 0, 0, 160, 90);
                    clip.thumbnail = canvas.toDataURL('image/jpeg', 0.7);
                } catch(e) { clip.thumbnail = null; }
            }
        }
        
        function updateClipsList() {
            clipsList.innerHTML = detectedClips.length === 0 
                ? '<p style="color:var(--text2);text-align:center;padding:20px;">Analysis runs automatically when video loads.</p>'
                : '';
            clipCount.textContent = detectedClips.length;
            
            detectedClips.forEach((clip, idx) => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.innerHTML = `
                    <div class="clip-thumb">${clip.thumbnail ? `<img src="${clip.thumbnail}">` : '🎬'}</div>
                    <div class="clip-info">
                        <h4>${clip.title}</h4>
                        <div class="meta">
                            <span>🕐 ${formatTime(clip.startTime)} – ${formatTime(clip.endTime)}</span>
                            <span>📏 ${clip.duration.toFixed(1)}s</span>
                            <span>⭐ ${(clip.score*10).toFixed(1)}</span>
                        </div>
                    </div>
                    <div class="clip-actions">
                        <button class="btn-preview" data-idx="${idx}">▶️</button>
                        <button class="btn-export" data-idx="${idx}">💾</button>
                    </div>`;
                clipsList.appendChild(card);
            });
            
            document.querySelectorAll('.btn-preview').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const clip = detectedClips[parseInt(b.dataset.idx)];
                    mainVideo.currentTime = clip.startTime;
                    mainVideo.play().catch(()=>{});
                    showToast(`Previewing ${clip.title}...`, 'success');
                });
            });
            document.querySelectorAll('.btn-export').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    exportClip(parseInt(b.dataset.idx));
                });
            });
        }
        
        // Export functions (simplified - full version would render 9:16)
        async function exportClip(index) {
            const clip = detectedClips[index];
            if (!clip) return;
            
            showToast('⏳ Exporting clip...', '');
            progressSection.classList.add('show');
            progressLabel.textContent = '🎨 Creating clip...';
            progressFill.style.width = '50%';
            progressPercent.textContent = '50%';
            
            // For now, just download the segment using MediaRecorder
            try {
                const blob = await recordClipSegment(clip);
                currentExportBlob = blob;
                previewVideo.src = URL.createObjectURL(blob);
                exportModal.classList.add('show');
                progressSection.classList.remove('show');
                showToast('Clip ready! Click Download to save.', 'success');
            } catch(e) {
                progressSection.classList.remove('show');
                showToast('Export failed. Try a different browser.', 'error');
            }
        }
        
        async function recordClipSegment(clip) {
            const stream = mainVideo.captureStream ? mainVideo.captureStream(24) : null;
            if (!stream) throw new Error('captureStream not supported');
            
            const chunks = [];
            const recorder = new MediaRecorder(stream, { 
                mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9') 
                    ? 'video/webm;codecs=vp9' 
                    : 'video/webm'
            });
            
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            mainVideo.currentTime = clip.startTime;
            await new Promise(r => setTimeout(r, 200));
            recorder.start();
            mainVideo.play().catch(()=>{});
            
            await new Promise(resolve => setTimeout(resolve, clip.duration * 1000));
            
            recorder.stop();
            mainVideo.pause();
            
            return new Promise(resolve => {
                recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/webm' }));
            });
        }
        
        downloadClip.addEventListener('click', () => {
            if (!currentExportBlob) return;
            const url = URL.createObjectURL(currentExportBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `short_clip_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            showToast('Downloaded! 🎉', 'success');
            exportModal.classList.remove('show');
        });
        
        closeModal.addEventListener('click', () => {
            exportModal.classList.remove('show');
            previewVideo.src = '';
        });
        
        exportFirstBtn.addEventListener('click', () => {
            if (detectedClips.length > 0) exportClip(0);
            else showToast('No clips to export', 'error');
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') exportModal.classList.remove('show');
        });
        
        console.log('✅ ShortClipper YT ready! Paste any YouTube URL to auto-clip.');
        console.log('💡 Tip: For best results with YouTube, host this file on a web server');
    })();
    </script>
